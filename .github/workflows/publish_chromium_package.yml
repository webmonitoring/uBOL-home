name: publish_chromium_package

on:
  push:
    branches:
      - wm/patches
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-chromium-package
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com/
          scope: "@webmonitoring"

      - name: Sync package version from src manifest
        run: node webmonitoring/scripts/sync-chromium-package-version.mjs

      - name: Set publish package version
        id: versioning
        run: |
          BASE_VERSION=$(node -e "const p=require('./chromium/package.json'); process.stdout.write(p.version)")
          NEW_VERSION="${BASE_VERSION}-$(git rev-list --count HEAD)"
          COMMIT_COUNT="${NEW_VERSION#${BASE_VERSION}-}"
          node -e "const fs=require('fs'); const p='chromium/package.json'; const pkg=JSON.parse(fs.readFileSync(p,'utf8')); pkg.version=process.argv[1]; fs.writeFileSync(p, JSON.stringify(pkg, null, 2)+'\n');" "$NEW_VERSION"

      - name: Publish package
        if: steps.exists.outputs.already_published != 'true'
        working-directory: chromium
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --registry=https://npm.pkg.github.com/ --ignore-scripts
